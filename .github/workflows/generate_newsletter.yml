name: Generate SEA Electronics Newsletter

# ── Triggers ───────────────────────────────────────────────────────────────
on:
  schedule:
    # Every Monday at 08:00 SGT (UTC+8) = 00:00 UTC
    - cron: '0 0 * * 1'

  # Allow manual run from GitHub → Actions tab → "Run workflow"
  workflow_dispatch:
    inputs:
      provider:
        description: 'LLM provider'
        required: false
        default: 'deepseek'
        type: choice
        options: [deepseek, anthropic]
      dry_run:
        description: 'Dry run (search only, skip LLM + email)'
        required: false
        default: false
        type: boolean

# ── Permissions ────────────────────────────────────────────────────────────
permissions:
  contents: write   # needed to commit generated HTML back to the repo

# ── Job ───────────────────────────────────────────────────────────────────
jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Install Python dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Generate newsletter + send email (all in one Python call)
      - name: Generate newsletter and send email
        env:
          # ── LLM API keys ────────────────────────────────────────────────
          DEEPSEEK_API_KEY:  ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

          # ── Web search ──────────────────────────────────────────────────
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}

          # ── Email delivery ──────────────────────────────────────────────
          EMAIL_FROM:      ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD:  ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:        ${{ secrets.EMAIL_TO }}
          EMAIL_CC:        ${{ secrets.EMAIL_CC }}
          EMAIL_SMTP_HOST: ${{ vars.EMAIL_SMTP_HOST || 'smtp.gmail.com' }}
          EMAIL_SMTP_PORT: ${{ vars.EMAIL_SMTP_PORT || '465' }}

          # ── Provider: manual input wins, else repo variable, else deepseek
          PROVIDER: ${{ inputs.provider || vars.PROVIDER || 'deepseek' }}

          # ── Output folder inside the repo
          OUTPUT_DIR: ./output

          # ── Optional model / token overrides (set as GitHub Variables)
          MODEL:                    ${{ vars.MODEL }}
          MAX_TOKENS:               ${{ vars.MAX_TOKENS }}
          SEARCH_RESULTS_PER_QUERY: ${{ vars.SEARCH_RESULTS_PER_QUERY }}

        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python generate_newsletter.py --dry-run
          else
            python generate_newsletter.py
          fi

      # 5. Upload HTML as a downloadable artifact (keeps 90 days)
      - name: Upload newsletter artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newsletter-${{ github.run_number }}
          path: output/*.html
          retention-days: 90

      # 6. Commit the HTML file back into the repo (for version history)
      - name: Commit newsletter to repository
        if: success() && inputs.dry_run != 'true'
        run: |
          git config user.name  "Newsletter Bot"
          git config user.email "newsletter-bot@users.noreply.github.com"
          git add output/
          if git diff --staged --quiet; then
            echo "No new file to commit (content unchanged)."
          else
            DATE=$(date -u '+%Y-%m-%d')
            git commit -m "newsletter: auto-generated ${DATE} [skip ci]"
            git push
            echo "✓ Newsletter committed and pushed."
          fi
